name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Create Xcode Project and Build
        run: |
          # 1. إنشاء مجلد المشروع
          mkdir -p MovieBoxApp
          cd MovieBoxApp

          # 2. إنشاء كود Swift (لفتح الموقع داخل التطبيق)
          cat > MovieBoxApp.swift << 'EOF'
          import SwiftUI
          import WebKit

          struct WebView: UIViewRepresentable {
              let url: URL
              func makeUIView(context: Context) -> WKWebView {
                  let configuration = WKWebViewConfiguration()
                  configuration.allowsInlineMediaPlayback = true
                  configuration.mediaTypesRequiringUserActionForPlayback = []
                  
                  let webView = WKWebView(frame: .zero, configuration: configuration)
                  webView.load(URLRequest(url: url))
                  webView.allowsBackForwardNavigationGestures = true
                  webView.scrollView.contentInsetAdjustmentBehavior = .never
                  return webView
              }
              func updateUIView(_ uiView: WKWebView, context: Context) {}
          }

          @main
          struct MovieBoxApp: App {
              var body: some Scene {
                  WindowGroup {
                      WebView(url: URL(string: "https://movie-box.co/")!)
                  }
              }
          }
          EOF

          # 3. إنشاء ملف Info.plist يدوياً (لحل مشكلة الخطأ السابق)
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>$(DEVELOPMENT_LANGUAGE)</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>$(PRODUCT_BUNDLE_PACKAGE_TYPE)</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
              </dict>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key>
                  <true/>
              </dict>
          </dict>
          </plist>
          EOF

          # 4. إنشاء ملف project.yml الخاص بـ XcodeGen
          cat > project.yml << 'EOF'
          name: MovieBoxApp
          options:
            bundleIdPrefix: com.moviebox
            deploymentTarget:
              iOS: "15.0"
          targets:
            MovieBoxApp:
              type: application
              platform: iOS
              sources:
                - path: .
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.moviebox.app
                  INFOPLIST_FILE: Info.plist
                  CODE_SIGNING_ALLOWED: NO
                  CODE_SIGNING_REQUIRED: NO
                  TARGETED_DEVICE_FAMILY: "1,2"
          EOF

          # 5. تثبيت أداة XcodeGen وإنشاء مشروع Xcode
          brew install xcodegen
          xcodegen generate

          # 6. بناء التطبيق وأرشفته
          xcodebuild -project MovieBoxApp.xcodeproj \
          -scheme MovieBoxApp \
          -configuration Release \
          -archivePath build/MovieBoxApp.xcarchive \
          -destination "generic/platform=iOS" \
          archive CODE_SIGNING_ALLOWED=NO

          # 7. استخراج ملف .ipa غير الموقع
          mkdir -p Payload
          cp -r build/MovieBoxApp.xcarchive/Products/Applications/MovieBoxApp.app Payload/
          zip -r MovieBox-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieBox-Unsigned-IPA
          path: MovieBoxApp/MovieBox-Unsigned.ipa
