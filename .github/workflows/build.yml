name: Build Pro Native iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Create App Icon and Assets
        run: |
          mkdir -p Assets.xcassets/AppIcon.appiconset
          
          # تحميل أيقونة سوداء احترافية
          curl -s -o Assets.xcassets/AppIcon.appiconset/icon.png "https://dummyimage.com/1024x1024/000000/ffffff.png&text=Movie+Box"
          
          cat > Assets.xcassets/AppIcon.appiconset/Contents.json << 'EOF'
          {
            "images" : [
              {
                "filename" : "icon.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF
          
          cat > Assets.xcassets/Contents.json << 'EOF'
          {
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF

      - name: Create Xcode Project Files
        run: |
          mkdir -p MovieBoxApp.xcodeproj/xcshareddata/xcschemes

          # 1. إنشاء كود Swift (تطبيق أصلي - واجهة سينمائية - حظر إعلانات صارم)
          cat > MovieBoxApp.swift << 'EOF'
          import SwiftUI
          import WebKit

          // قواعد حظر خوادم الإعلانات بشكل صارم
          let adBlockRules = """
          [
              {"trigger": {"url-filter": ".*googleads.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*doubleclick.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*adservice.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*adsterra.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*popads.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*propellerads.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*aliexpress.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*shein.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*googlesyndication.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*cdn.*ads.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*"}, "action": {"type": "css-display-none", "selector": "iframe[src*='ads'], .ad, .ads, #ad, #ads, .banner_ad, [id^='google_ads'], [class*='advertisement'], .popup, .modal, div[class*='pop-'], div[id*='ad-']"}}
          ]
          """

          // سكربت جافا سكربت متقدم لمنع الإعلانات المنبثقة
          let adBlockScript = """
          (function() {
              // 1. منع فتح أي نافذة منبثقة
              window.open = function() { return null; };
              
              // 2. منع إعادة توجيه الصفحة المخفية
              window.addEventListener('beforeunload', function(e) {
                  e.stopPropagation();
                  e.stopImmediatePropagation();
              }, true);
              
              // 3. حذف العناصر المزعجة فور ظهورها
              function removeAds() {
                  const adSelectors = ['iframe[src*="ads"]', '.ad', '.ads', '#ad', '#ads', '.banner_ad', '[id^="google_ads"]', '[class*="advertisement"]', '.popup', '.modal', 'div[class*="pop"]', 'div[id*="pop"]', 'div[id*="banner"]'];
                  adSelectors.forEach(selector => {
                      document.querySelectorAll(selector).forEach(el => el.remove());
                  });
              }
              
              // مراقبة الموقع بشكل دائم
              const observer = new MutationObserver(function(mutations) {
                  removeAds();
              });
              
              window.addEventListener('load', function() {
                  removeAds();
                  observer.observe(document.body, { childList: true, subtree: true });
              });
              
              removeAds();
          })();
          """

          class UIKitWebView: UIViewController, WKNavigationDelegate, WKUIDelegate {
              var webView: WKWebView!
              var toolBar: UIToolbar!
              
              override func viewDidLoad() {
                  super.viewDidLoad()
                  
                  let config = WKWebViewConfiguration()
                  
                  // إخفاء هوية المتصفح ليظهر التطبيق كتطبيق أصلي (Native App)
                  // هذا يخدع الموقع ليعطي تجربة خالية من إعلانات الويب
                  if let userAgent = UIWebView().stringByEvaluatingJavaScript(from: "navigator.userAgent") {
                      config.applicationNameForUserAgent = userAgent + " MovieBoxNativeApp/1.0"
                  } else {
                      config.applicationNameForUserAgent = "Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X) AppleWebKit/605.1.15 MovieBoxNativeApp/1.0"
                  }
                  
                  // تطبيق حظر الخوادم
                  WKContentRuleListStore.default().compileContentRuleList(
                      forIdentifier: "ContentBlockerPro",
                      encodedContentRuleList: adBlockRules
                  ) { ruleList, error in
                      if let ruleList = ruleList {
                          config.userContentController.add(ruleList)
                      }
                  }
                  
                  // حقن سكربت منع الإعلانات
                  let userScript = WKUserScript(source: adBlockScript, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                  config.userContentController.addUserScript(userScript)
                  
                  // إعداد الويب فيو بشاشة كاملة
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  webView.navigationDelegate = self
                  webView.uiDelegate = self
                  webView.scrollView.contentInsetAdjustmentBehavior = .never
                  webView.allowsBackForwardNavigationGestures = true
                  view.addSubview(webView)
                  
                  // شريط أدوات سفلي عائم شفاف
                  setupFloatingToolbar()
                  
                  if let url = URL(string: "https://movie-box.co/") {
                      webView.load(URLRequest(url: url))
                  }
              }
              
              func setupFloatingToolbar() {
                  toolBar = UIToolbar()
                  toolBar.translatesAutoresizingMaskIntoConstraints = false
                  toolBar.barTintColor = UIColor.black.withAlphaComponent(0.6)
                  toolBar.alpha = 0.0 // شفاف افتراضياً
                  
                  let back = UIBarButtonItem(image: UIImage(systemName: "chevron.left"), style: .plain, target: self, action: #selector(goBack))
                  let forward = UIBarButtonItem(image: UIImage(systemName: "chevron.right"), style: .plain, target: self, action: #selector(goForward))
                  let reload = UIBarButtonItem(image: UIImage(systemName: "arrow.clockwise"), style: .plain, target: self, action: #selector(reloadPage))
                  let share = UIBarButtonItem(image: UIImage(systemName: "square.and.arrow.up"), style: .plain, target: self, action: #selector(shareTapped))
                  let flexible = UIBarButtonItem(barButtonSystemItem: .flexibleSpace, target: nil, action: nil)
                  
                  toolBar.items = [back, flexible, forward, flexible, reload, flexible, share]
                  toolBar.tintColor = .white
                  
                  view.addSubview(toolBar)
                  
                  NSLayoutConstraint.activate([
                        toolBar.bottomAnchor.constraint(equalTo: view.safeAreaLayoutGuide.bottomAnchor, constant: -10),
                        toolBar.leadingAnchor.constraint(equalTo: view.leadingAnchor, constant: 20),
                        toolBar.trailingAnchor.constraint(equalTo: view.trailingAnchor, constant: -20),
                        toolBar.heightAnchor.constraint(equalToConstant: 44)
                  ])
              }
              
              override func touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?) {
                  super.touchesBegan(touches, with: event)
                  // إظهار أو إخفاء الشريط عند اللمس
                  UIView.animate(withDuration: 0.3) {
                      self.toolBar.alpha = self.toolBar.alpha == 0.0 ? 1.0 : 0.0
                  }
              }
              
              @objc func goBack() { if webView.canGoBack { webView.goBack() } }
              @objc func goForward() { if webView.canGoForward { webView.goForward() } }
              @objc func reloadPage() { webView.reload() }
              @objc func shareTapped() {
                  guard let url = webView.url else { return }
                  let shareSheet = UIActivityViewController(activityItems: [url], applicationActivities: nil)
                  present(shareSheet, animated: true)
              }
              
              // منع أي نافذة منبثقة من الفتح بشكل جذري
              func webView(_ webView: WKWebView, createWebViewWith configuration: WKWebViewConfiguration, for navigationAction: WKNavigationAction, windowFeatures: WKWindowFeatures) -> WKWebView? {
                  if navigationAction.targetFrame == nil {
                      webView.load(navigationAction.request)
                  }
                  return nil
              }
          }

          @main
          struct MovieBoxApp: App {
              var body: some Scene {
                  WindowGroup {
                      // تغليف الـ UIKit داخل SwiftUI لضمان عمل الـ Safe Area بشكل احترافي
                      UIKitWebView()
                          .ignoresSafeArea()
                          .preferredColorScheme(.dark)
                  }
              }
          }
          EOF

          # 2. إنشاء ملف Info.plist يدوياً
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>com.moviebox.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MovieBox</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict>
                  <key>UIColorName</key>
                  <string>black</string>
              </dict>
              <key>UIUserInterfaceStyle</key>
              <string>Dark</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key>
                  <true/>
              </dict>
          </dict>
          </plist>
          EOF

          # 3. إنشاء ملف project.pbxproj
          cat > MovieBoxApp.xcodeproj/project.pbxproj << 'EOF'
          // !$*UTF8*$!
          {
              archiveVersion = 1;
              classes = {};
              objectVersion = 56;
              objects = {
          /* Begin PBXFileReference section */
                  111111111111111111111101 /* MovieBoxApp.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = MovieBoxApp.swift; sourceTree = "<group>"; };
                  111111111111111111111102 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };
                  111111111111111111111103 /* MovieBoxApp.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = MovieBoxApp.app; sourceTree = BUILT_PRODUCTS_DIR; };
                  222222222222222222222201 /* Assets.xcassets */ = {isa = PBXFileReference; lastKnownFileType = folder.assetcatalog; path = Assets.xcassets; sourceTree = "<group>"; };
          /* End PBXFileReference section */

          /* Begin PBXBuildFile section */
                  111111111111111111111104 /* MovieBoxApp.swift in Sources */ = {isa = PBXBuildFile; fileRef = 111111111111111111111101 /* MovieBoxApp.swift */; };
                  222222222222222222222202 /* Assets.xcassets in Resources */ = {isa = PBXBuildFile; fileRef = 222222222222222222222201 /* Assets.xcassets */; };
          /* End PBXBuildFile section */

          /* Begin PBXGroup section */
                  111111111111111111111110 /* Main Group */ = {
                      isa = PBXGroup;
                      children = (
                          111111111111111111111120 /* Products */,
                          111111111111111111111101 /* MovieBoxApp.swift */,
                          111111111111111111111102 /* Info.plist */,
                          222222222222222222222201 /* Assets.xcassets */,
                      );
                      sourceTree = "<group>";
                  };
                  111111111111111111111120 /* Products */ = {
                      isa = PBXGroup;
                      children = (
                          111111111111111111111103 /* MovieBoxApp.app */,
