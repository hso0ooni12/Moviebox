name: Build Pro iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Create App Icon and Assets
        run: |
          mkdir -p Assets.xcassets/AppIcon.appiconset
          
          # إنشاء أيقونة التطبيق (1024x1024) بلون أسود ونص أبيض
          curl -s -o Assets.xcassets/AppIcon.appiconset/icon.png "https://dummyimage.com/1024x1024/000000/ffffff.png&text=Movie+Box"
          
          cat > Assets.xcassets/AppIcon.appiconset/Contents.json << 'EOF'
          {
            "images" : [
              {
                "filename" : "icon.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF
          
          cat > Assets.xcassets/Contents.json << 'EOF'
          {
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF

      - name: Create Xcode Project Files
        run: |
          mkdir -p MovieBoxApp.xcodeproj/xcshareddata/xcschemes

          # 1. إنشاء كود Swift (واجهة احترافية + حظر إعلانات + شريط أدوات)
          cat > MovieBoxApp.swift << 'EOF'
          import SwiftUI
          import WebKit

          // قواعد حظر الإعلانات (AdBlocker Rules)
          let adBlockRules = """
          [
              {"trigger": {"url-filter": ".*googleads.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*doubleclick.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*adservice.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*adsterra.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*popads.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*propellerads.*"}, "action": {"type": "block"}},
              {"trigger": {"url-filter": ".*"}, "action": {"type": "css-display-none", "selector": "iframe[src*='ads'], .ad, .ads, #ad, #ads, .banner_ad, [id^='google_ads'], [class*='advertisement']"}}
          ]
          """

          struct WebViewContainer: UIViewControllerRepresentable {
              func makeUIViewController(context: Context) -> UINavigationController {
                  let webVC = WebViewController()
                  let navController = UINavigationController(rootViewController: webVC)
                  return navController
              }
              func updateUIViewController(_ uiViewController: UINavigationController, context: Context) {}
          }

          class WebViewController: UIViewController, WKNavigationDelegate {
              var webView: WKWebView!
              var progressView: UIProgressView!

              override func viewDidLoad() {
                  super.viewDidLoad()
                  
                  let config = WKWebViewConfiguration()
                  
                  // تطبيق حظر الإعلانات
                  WKContentRuleListStore.default().compileContentRuleList(
                      forIdentifier: "AdBlocker",
                      encodedContentRuleList: adBlockRules
                  ) { ruleList, error in
                      if let ruleList = ruleList {
                          config.userContentController.add(ruleList)
                      }
                      DispatchQueue.main.async {
                          self.setupWebView(config: config)
                      }
                  }
              }
              
              func setupWebView(config: WKWebViewConfiguration) {
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  webView.navigationDelegate = self
                  view.addSubview(webView)
                  
                  // إعداد شريط التحميل العلوي
                  progressView = UIProgressView(progressViewStyle: .bar)
                  progressView.translatesAutoresizingMaskIntoConstraints = false
                  progressView.tintColor = .systemBlue
                  navigationController?.navigationBar.addSubview(progressView)
                  
                  NSLayoutConstraint.activate([
                      progressView.bottomAnchor.constraint(equalTo: navigationController!.navigationBar.bottomAnchor),
                      progressView.leadingAnchor.constraint(equalTo: navigationController!.navigationBar.leadingAnchor),
                      progressView.trailingAnchor.constraint(equalTo: navigationController!.navigationBar.trailingAnchor)
                  ])
                  
                  webView.addObserver(self, forKeyPath: #keyPath(WKWebView.estimatedProgress), options: .new, context: nil)
                  
                  // إعداد شريط الأدوات السفلي
                  navigationController?.isToolbarHidden = false
                  navigationController?.toolbar.barTintColor = .systemBackground
                  
                  let back = UIBarButtonItem(image: UIImage(systemName: "chevron.left"), style: .plain, target: webView, action: #selector(webView.goBack))
                  let forward = UIBarButtonItem(image: UIImage(systemName: "chevron.right"), style: .plain, target: webView, action: #selector(webView.goForward))
                  let reload = UIBarButtonItem(image: UIImage(systemName: "arrow.clockwise"), style: .plain, target: webView, action: #selector(webView.reload))
                  let share = UIBarButtonItem(image: UIImage(systemName: "square.and.arrow.up"), style: .plain, target: self, action: #selector(shareTapped))
                  let flexible = UIBarButtonItem(barButtonSystemItem: .flexibleSpace, target: nil, action: nil)
                  
                  toolbarItems = [back, flexible, forward, flexible, reload, flexible, share]
                  
                  back.tintColor = .systemBlue
                  forward.tintColor = .systemBlue
                  reload.tintColor = .systemBlue
                  share.tintColor = .systemBlue
                  
                  if let url = URL(string: "https://movie-box.co/") {
                      webView.load(URLRequest(url: url))
                  }
              }
              
              @objc func shareTapped() {
                  guard let url = webView.url else { return }
                  let shareSheet = UIActivityViewController(activityItems: [url], applicationActivities: nil)
                  present(shareSheet, animated: true)
              }
              
              override func observeValue(forKeyPath keyPath: String?, of object: Any?, change: [NSKeyValueChangeKey : Any]?, context: UnsafeMutableRawPointer?) {
                  if keyPath == "estimatedProgress" {
                      progressView.progress = Float(webView.estimatedProgress)
                      progressView.isHidden = webView.estimatedProgress >= 1.0
                  }
              }
              
              func webView(_ webView: WKWebView, didFinish navigation: WKNavigation!) {
                  title = webView.title
                  // إخفاء عناصر المتصفح الخاصة بالموقع إذا وجدت لتبدو كتطبيق
                  webView.evaluateJavaScript("document.querySelector('meta[name=viewport]').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0');", completionHandler: nil)
              }
          }

          @main
          struct MovieBoxApp: App {
              var body: some Scene {
                  WindowGroup {
                      WebViewContainer()
                          .preferredColorScheme(.dark) // إجبار الوضع الليلي ليناسب مواقع الأفلام
                  }
              }
          }
          EOF

          # 2. إنشاء ملف Info.plist يدوياً
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>com.moviebox.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MovieBox</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict>
                  <key>UIColorName</key>
                  <string>black</string>
              </dict>
              <key>UIUserInterfaceStyle</key>
              <string>Dark</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key>
                  <true/>
              </dict>
          </dict>
          </plist>
          EOF

          # 3. إنشاء ملف project.pbxproj (مع إضافة الأيقونات)
          cat > MovieBoxApp.xcodeproj/project.pbxproj << 'EOF'
          // !$*UTF8*$!
          {
              archiveVersion = 1;
              classes = {};
              objectVersion = 56;
              objects = {
          /* Begin PBXFileReference section */
                  111111111111111111111101 /* MovieBoxApp.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = MovieBoxApp.swift; sourceTree = "<group>"; };
                  111111111111111111111102 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };
                  111111111111111111111103 /* MovieBoxApp.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = MovieBoxApp.app; sourceTree = BUILT_PRODUCTS_DIR; };
                  222222222222222222222201 /* Assets.xcassets */ = {isa = PBXFileReference; lastKnownFileType = folder.assetcatalog; path = Assets.xcassets; sourceTree = "<group>"; };
          /* End PBXFileReference section */

          /* Begin PBXBuildFile section */
                  111111111111111111111104 /* MovieBoxApp.swift in Sources */ = {isa = PBXBuildFile; fileRef = 111111111111111111111101 /* MovieBoxApp.swift */; };
                  222222222222222222222202 /* Assets.xcassets in Resources */ = {isa = PBXBuildFile; fileRef = 222222222222222222222201 /* Assets.xcassets */; };
          /* End PBXBuildFile section */

          /* Begin PBXGroup section */
                  111111111111111111111110 /* Main Group */ = {
                      isa = PBXGroup;
                      children = (
                          111111111111111111111120 /* Products */,
                          111111111111111111111101 /* MovieBoxApp.swift */,
                          111111111111111111111102 /* Info.plist */,
                          222222222222222222222201 /* Assets.xcassets */,
                      );
                      sourceTree = "<group>";
                  };
                  111111111111111111111120 /* Products */ = {
                      isa = PBXGroup;
                      children = (
                          111111111111111111111103 /* MovieBoxApp.app */,
                      );
                      name = Products;
                      sourceTree = "<group>";
                  };
          /* End PBXGroup section */

          /* Begin PBXNativeTarget section */
                  111111111111111111111130 /* MovieBoxApp */ = {
                      isa = PBXNativeTarget;
                      buildConfigurationList = 111111111111111111111150 /* Build configuration list for PBXNativeTarget "MovieBoxApp" */;
                      buildPhases = (
                          111111111111111111111140 /* Sources */,
                          333333333333333333333340 /* Resources */,
                      );
                      buildRules = ();
                      dependencies = ();
                      name = MovieBoxApp;
                      productName = MovieBoxApp;
                      productReference = 111111111111111111111103 /* MovieBoxApp.app */;
                      productType = "com.apple.product-type.application";
                  };
          /* End PBXNativeTarget section */

          /* Begin PBXProject section */
                  111111111111111111111160 /* Project object */ = {
                      isa = PBXProject;
                      buildConfigurationList = 111111111111111111111170 /* Build configuration list for PBXProject "MovieBoxApp" */;
                      compatibilityVersion = "Xcode 14.0";
                      developmentRegion = en;
                      hasScannedForEncodings = 0;
                      knownRegions = ("en", "Base");
                      mainGroup = 111111111111111111111110 /* Main Group */;
                      productRefGroup = 111111111111111111111120 /* Products */;
                      projectDirPath = "";
                      projectRoot = "";
                      targets = (
                          111111111111111111111130 /* MovieBoxApp */,
                      );
                  };
          /* End PBXProject section */

          /* Begin PBXResourcesBuildPhase section */
                  333333333333333333333340 /* Resources */ = {
                      isa = PBXResourcesBuildPhase;
                      buildActionMask = 2147483647;
                      files = (
                          222222222222222222222202 /* Assets.xcassets in Resources */,
                      );
                      runOnlyForDeploymentPostprocessing = 0;
                  };
          /* End PBXResourcesBuildPhase section */

          /* Begin PBXSourcesBuildPhase section */
                  111111111111111111111140 /* Sources */ = {
                      isa = PBXSourcesBuildPhase;
                      buildActionMask = 2147483647;
                      files = (
                          111111111111111111111104 /* MovieBoxApp.swift in Sources */,
                      );
                      runOnlyForDeploymentPostprocessing = 0;
                  };
          /* End PBXSourcesBuildPhase section */

          /* Begin XCBuildConfiguration section */
                  111111111111111111111180 /* Debug */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ALWAYS_SEARCH_USER_PATHS = NO;
                          CLANG_ENABLE_MODULES = YES;
                          "CODE_SIGN_IDENTITY[sdk=macosx*]" = "-";
                          COPY_PHASE_STRIP = NO;
                          DEBUG_INFORMATION_FORMAT = dwarf;
                          ENABLE_STRICT_OBJC_MSGSEND = YES;
                          ENABLE_TESTABILITY = YES;
                          GCC_OPTIMIZATION_LEVEL = 0;
                          IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                          MTL_ENABLE_DEBUG_INFO = YES;
                          ONLY_ACTIVE_ARCH = YES;
                          SDKROOT = iphoneos;
                          SWIFT_ACTIVE_COMPILATION_CONDITIONS = DEBUG;
                          SWIFT_OPTIMIZATION_LEVEL = "-Onone";
                      };
                      name = Debug;
                  };
                  111111111111111111111181 /* Release */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ALWAYS_SEARCH_USER_PATHS = NO;
                          CLANG_ENABLE_MODULES = YES;
                          "CODE_SIGN_IDENTITY[sdk=macosx*]" = "-";
                          COPY_PHASE_STRIP = NO;
                          DEBUG_INFORMATION_FORMAT = "dwarf-with-dsym";
                          ENABLE_NS_ASSERTIONS = NO;
                          ENABLE_STRICT_OBJC_MSGSEND = YES;
                          IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                          MTL_ENABLE_DEBUG_INFO = NO;
                          SDKROOT = iphoneos;
                          SWIFT_COMPILATION_MODE = wholemodule;
                          SWIFT_OPTIMIZATION_LEVEL = "-O";
                          VALIDATE_PRODUCT = YES;
                      };
                      name = Release;
                  };
                  111111111111111111111190 /* Debug */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
                          CODE_SIGN_IDENTITY = "";
                          CODE_SIGNING_ALLOWED = NO;
                          CODE_SIGNING_REQUIRED = NO;
                          INFOPLIST_FILE = Info.plist;
                          INFOPLIST_KEY_UIApplicationSceneManifest_Generation = YES;
                          INFOPLIST_KEY_UILaunchScreen_Generation = YES;
                          LD_RUNPATH_SEARCH_PATHS = "$(inherited) @executable_path/Frameworks";
                          PRODUCT_BUNDLE_IDENTIFIER = com.moviebox.app;
                          PRODUCT_NAME = "$(TARGET_NAME)";
                          SWIFT_VERSION = 5.0;
                          TARGETED_DEVICE_FAMILY = "1,2";
                      };
                      name = Debug;
                  };
                  111111111111111111111191 /* Release */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
                          CODE_SIGN_IDENTITY = "";
                          CODE_SIGNING_ALLOWED = NO;
                          CODE_SIGNING_REQUIRED = NO;
                          INFOPLIST_FILE = Info.plist;
                          INFOPLIST_KEY_UIApplicationSceneManifest_Generation = YES;
                          INFOPLIST_KEY_UILaunchScreen_Generation = YES;
                          LD_RUNPATH_SEARCH_PATHS = "$(inherited) @executable_path/Frameworks";
                          PRODUCT_BUNDLE_IDENTIFIER = com.moviebox.app;
                          PRODUCT_NAME = "$(TARGET_NAME)";
                          SWIFT_VERSION = 5.0;
                          TARGETED_DEVICE_FAMILY = "1,2";
                      };
                      name = Release;
                  };
          /* End XCBuildConfiguration section */

          /* Begin XCConfigurationList section */
                  111111111111111111111150 /* Build configuration list for PBXNativeTarget "MovieBoxApp" */ = {
                      isa = XCConfigurationList;
                      buildConfigurations = (
                          111111111111111111111190 /* Debug */,
                          111111111111111111111191 /* Release */,
                      );
                      defaultConfigurationIsVisible = 0;
                      defaultConfigurationName = Release;
                  };
                  111111111111111111111170 /* Build configuration list for PBXProject "MovieBoxApp" */ = {
                      isa = XCConfigurationList;
                      buildConfigurations = (
                          111111111111111111111180 /* Debug */,
                          111111111111111111111181 /* Release */,
                      );
                      defaultConfigurationIsVisible = 0;
                      defaultConfigurationName = Release;
                  };
          /* End XCConfigurationList section */
              };
              rootObject = 111111111111111111111160 /* Project object */;
          }
          EOF

          # 4. إنشاء ملف Scheme
          cat > MovieBoxApp.xcodeproj/xcshareddata/xcschemes/MovieBoxApp.xcscheme << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <Scheme
             LastUpgradeVersion = "1400"
             version = "1.3">
             <BuildAction
                parallelizeBuildables = "YES"
                buildImplicitDependencies = "YES">
                <BuildActionEntries>
                   <BuildActionEntry
                      buildForTesting = "YES"
                      buildForRunning = "YES"
                      buildForProfiling = "YES"
                      buildForArchiving = "YES"
                      buildForAnalyzing = "YES">
                      <BuildableReference
                         BuildableIdentifier = "primary"
                         BlueprintIdentifier = "111111111111111111111130"
                         BuildableName = "MovieBoxApp.app"
                         BlueprintName = "MovieBoxApp"
                         ReferencedContainer = "container:MovieBoxApp.xcodeproj">
                      </BuildableReference>
                   </BuildActionEntry>
                </BuildActionEntries>
             </BuildAction>
             <TestAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                shouldUseLaunchSchemeArgsEnv = "YES">
                <Testables>
                </Testables>
             </TestAction>
             <LaunchAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                launchStyle = "0"
                useCustomWorkingDirectory = "NO"
                ignoresPersistentStateOnLaunch = "NO"
                debugDocumentVersioning = "YES"
                debugServiceExtension = "internal"
                allowLocationSimulation = "YES">
             </LaunchAction>
             <ProfileAction
                buildConfiguration = "Release"
                shouldUseLaunchSchemeArgsEnv = "YES"
                savedToolIdentifier = ""
                useCustomWorkingDirectory = "NO"
                debugDocumentVersioning = "YES">
             </ProfileAction>
             <AnalyzeAction
                buildConfiguration = "Debug">
             </AnalyzeAction>
             <ArchiveAction
                buildConfiguration = "Release"
                revealArchiveInOrganizer = "YES">
             </ArchiveAction>
          </Scheme>
          EOF

      - name: Build and Archive IPA
        run: |
          xcodebuild -project MovieBoxApp.xcodeproj \
          -scheme MovieBoxApp \
          -configuration Release \
          -archivePath build/MovieBoxApp.xcarchive \
          -destination "generic/platform=iOS" \
          archive CODE_SIGNING_ALLOWED=NO

          mkdir -p Payload
          cp -r build/MovieBoxApp.xcarchive/Products/Applications/MovieBoxApp.app Payload/
          zip -r MovieBox-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieBox-Pro-IPA
          path: MovieBox-Unsigned.ipa
