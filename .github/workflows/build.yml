name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Create Xcode Project and Build
        run: |
          # 1. إنشاء مجلد المشروع
          mkdir -p MovieBoxApp
          cd MovieBoxApp

          # 2. إنشاء ملفات Swift الخاصة بفتح الموقع (WebView)
          cat > MovieBoxApp.swift << 'EOF'
          import SwiftUI
          import WebKit

          struct WebView: UIViewRepresentable {
              let url: URL
              func makeUIView(context: Context) -> WKWebView {
                  let configuration = WKWebViewConfiguration()
                  configuration.allowsInlineMediaPlayback = true
                  configuration.mediaTypesRequiringUserActionForPlayback = []
                  
                  let webView = WKWebView(frame: .zero, configuration: configuration)
                  webView.load(URLRequest(url: url))
                  webView.allowsBackForwardNavigationGestures = true
                  webView.scrollView.contentInsetAdjustmentBehavior = .never
                  return webView
              }
              func updateUIView(_ uiView: WKWebView, context: Context) {}
          }

          @main
          struct MovieBoxApp: App {
              var body: some Scene {
                  WindowGroup {
                      WebView(url: URL(string: "https://movie-box.co/")!)
                  }
              }
          }
          EOF

          # 3. إنشاء ملف project.yml لبناء مشروع Xcode باستخدام XcodeGen
          cat > project.yml << 'EOF'
          name: MovieBoxApp
          options:
            bundleIdPrefix: com.moviebox
            deploymentTarget:
              iOS: "15.0"
          targets:
            MovieBoxApp:
              type: application
              platform: iOS
              sources:
                - path: .
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.moviebox.app
                  INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
                  INFOPLIST_KEY_UILaunchScreen_Generation: YES
                  INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
                  ASSETCATALOG_COMPILER_APPICON_NAME: ""
                  CODE_SIGNING_ALLOWED: NO
                  CODE_SIGNING_REQUIRED: NO
          EOF

          # 4. تثبيت أداة XcodeGen وإنشاء مشروع Xcode
          brew install xcodegen
          xcodegen generate

          # 5. بناء التطبيق وأرشفته
          xcodebuild -project MovieBoxApp.xcodeproj \
          -scheme MovieBoxApp \
          -configuration Release \
          -archivePath build/MovieBoxApp.xcarchive \
          -destination "generic/platform=iOS" \
          archive CODE_SIGNING_ALLOWED=NO

          # 6. استخراج ملف .ipa غير الموقع
          mkdir -p Payload
          cp -r build/MovieBoxApp.xcarchive/Products/Applications/MovieBoxApp.app Payload/
          zip -r MovieBox-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieBox-Unsigned-IPA
          path: MovieBoxApp/MovieBox-Unsigned.ipa
