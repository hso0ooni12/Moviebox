name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Create and Build Xcode Project
        run: |
          mkdir -p MovieBoxApp
          cd MovieBoxApp

          # 1. إنشاء كود Swift (لفتح الموقع)
          cat > MovieBoxApp.swift << 'EOF'
          import SwiftUI
          import WebKit

          struct WebView: UIViewRepresentable {
              let url: URL
              func makeUIView(context: Context) -> WKWebView {
                  let configuration = WKWebViewConfiguration()
                  configuration.allowsInlineMediaPlayback = true
                  configuration.mediaTypesRequiringUserActionForPlayback = []
                  let webView = WKWebView(frame: .zero, configuration: configuration)
                  webView.load(URLRequest(url: url))
                  webView.allowsBackForwardNavigationGestures = true
                  return webView
              }
              func updateUIView(_ uiView: WKWebView, context: Context) {}
          }

          @main
          struct MovieBoxApp: App {
              var body: some Scene {
                  WindowGroup {
                      WebView(url: URL(string: "https://movie-box.co/")!)
                  }
              }
          }
          EOF

          # 2. إنشاء ملف Info.plist يدوياً
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>com.moviebox.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MovieBox</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key>
                  <true/>
              </dict>
          </dict>
          </plist>
          EOF

          # 3. سكربت Swift لإنشاء مشروع Xcode (pbxproj) بشكل صحيح ومضمون
          cat > generate_project.swift << 'EOF'
          import Foundation

          let pbxproj = """
          // !$*UTF8*$!
          {
              archiveVersion = 1;
              classes = {};
              objectVersion = 56;
              objects = {
          /* Begin PBXFileReference section */
                  8D1107310486CEB800E47090 /* MovieBoxApp.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = MovieBoxApp.app; sourceTree = BUILT_PRODUCTS_DIR; };
                  4A0000000000000000000001 /* MovieBoxApp.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = MovieBoxApp.swift; sourceTree = "<group>"; };
                  4A0000000000000000000002 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };
          /* End PBXFileReference section */

          /* Begin PBXBuildFile section */
                  4A0000000000000000000003 /* MovieBoxApp.swift in Sources */ = {isa = PBXBuildFile; fileRef = 4A0000000000000000000001 /* MovieBoxApp.swift */; };
          /* End PBXBuildFile section */

          /* Begin PBXGroup section */
                  4A0000000000000000000010 /* Main Group */ = {
                      isa = PBXGroup;
                      children = (
                          4A0000000000000000000020 /* Products */,
                          4A0000000000000000000001 /* MovieBoxApp.swift */,
                          4A0000000000000000000002 /* Info.plist */,
                      );
                      sourceTree = "<group>";
                  };
                  4A0000000000000000000020 /* Products */ = {
                      isa = PBXGroup;
                      children = (
                          8D1107310486CEB800E47090 /* MovieBoxApp.app */,
                      );
                      name = Products;
                      sourceTree = "<group>";
                  };
          /* End PBXGroup section */

          /* Begin PBXNativeTarget section */
                  4A0000000000000000000030 /* MovieBoxApp */ = {
                      isa = PBXNativeTarget;
                      buildConfigurationList = 4A0000000000000000000050 /* Build configuration list for PBXNativeTarget "MovieBoxApp" */;
                      buildPhases = (
                          4A0000000000000000000040 /* Sources */,
                      );
                      buildRules = ();
                      dependencies = ();
                      name = MovieBoxApp;
                      productName = MovieBoxApp;
                      productReference = 8D1107310486CEB800E47090 /* MovieBoxApp.app */;
                      productType = "com.apple.product-type.application";
                  };
          /* End PBXNativeTarget section */

          /* Begin PBXProject section */
                  4A0000000000000000000060 /* Project object */ = {
                      isa = PBXProject;
                      buildConfigurationList = 4A0000000000000000000070 /* Build configuration list for PBXProject "MovieBoxApp" */;
                      compatibilityVersion = "Xcode 14.0";
                      developmentRegion = en;
                      hasScannedForEncodings = 0;
                      knownRegions = ("en", "Base");
                      mainGroup = 4A0000000000000000000010 /* Main Group */;
                      productRefGroup = 4A0000000000000000000020 /* Products */;
                      projectDirPath = "";
                      projectRoot = "";
                      targets = (
                          4A0000000000000000000030 /* MovieBoxApp */,
                      );
                  };
          /* End PBXProject section */

          /* Begin PBXSourcesBuildPhase section */
                  4A0000000000000000000040 /* Sources */ = {
                      isa = PBXSourcesBuildPhase;
                      buildActionMask = 2147483647;
                      files = (
                          4A0000000000000000000003 /* MovieBoxApp.swift in Sources */,
                      );
                      runOnlyForDeploymentPostprocessing = 0;
                  };
          /* End PBXSourcesBuildPhase section */

          /* Begin XCBuildConfiguration section */
                  4A0000000000000000000080 /* Debug */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ALWAYS_SEARCH_USER_PATHS = NO;
                          CLANG_ENABLE_MODULES = YES;
                          "CODE_SIGN_IDENTITY[sdk=macosx*]" = "-";
                          COPY_PHASE_STRIP = NO;
                          DEBUG_INFORMATION_FORMAT = dwarf;
                          ENABLE_STRICT_OBJC_MSGSEND = YES;
                          ENABLE_TESTABILITY = YES;
                          GCC_OPTIMIZATION_LEVEL = 0;
                          IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                          MTL_ENABLE_DEBUG_INFO = YES;
                          ONLY_ACTIVE_ARCH = YES;
                          SDKROOT = iphoneos;
                          SWIFT_ACTIVE_COMPILATION_CONDITIONS = DEBUG;
                          SWIFT_OPTIMIZATION_LEVEL = "-Onone";
                      };
                      name = Debug;
                  };
                  4A0000000000000000000081 /* Release */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ALWAYS_SEARCH_USER_PATHS = NO;
                          CLANG_ENABLE_MODULES = YES;
                          "CODE_SIGN_IDENTITY[sdk=macosx*]" = "-";
                          COPY_PHASE_STRIP = NO;
                          DEBUG_INFORMATION_FORMAT = "dwarf-with-dsym";
                          ENABLE_NS_ASSERTIONS = NO;
                          ENABLE_STRICT_OBJC_MSGSEND = YES;
                          IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                          MTL_ENABLE_DEBUG_INFO = NO;
                          SDKROOT = iphoneos;
                          SWIFT_COMPILATION_MODE = wholemodule;
                          SWIFT_OPTIMIZATION_LEVEL = "-O";
                          VALIDATE_PRODUCT = YES;
                      };
                      name = Release;
                  };
                  4A0000000000000000000090 /* Debug */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
                          CODE_SIGN_IDENTITY = "";
                          CODE_SIGNING_ALLOWED = NO;
                          CODE_SIGNING_REQUIRED = NO;
                          INFOPLIST_FILE = Info.plist;
                          INFOPLIST_KEY_UIApplicationSceneManifest_Generation = YES;
                          INFOPLIST_KEY_UILaunchScreen_Generation = YES;
                          LD_RUNPATH_SEARCH_PATHS = "$(inherited) @executable_path/Frameworks";
                          PRODUCT_BUNDLE_IDENTIFIER = com.moviebox.app;
                          PRODUCT_NAME = "$(TARGET_NAME)";
                          SWIFT_VERSION = 5.0;
                          TARGETED_DEVICE_FAMILY = "1,2";
                      };
                      name = Debug;
                  };
                  4A0000000000000000000091 /* Release */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
                          CODE_SIGN_IDENTITY = "";
                          CODE_SIGNING_ALLOWED = NO;
                          CODE_SIGNING_REQUIRED = NO;
                          INFOPLIST_FILE = Info.plist;
                          INFOPLIST_KEY_UIApplicationSceneManifest_Generation = YES;
                          INFOPLIST_KEY_UILaunchScreen_Generation = YES;
                          LD_RUNPATH_SEARCH_PATHS = "$(inherited) @executable_path/Frameworks";
                          PRODUCT_BUNDLE_IDENTIFIER = com.moviebox.app;
                          PRODUCT_NAME = "$(TARGET_NAME)";
                          SWIFT_VERSION = 5.0;
                          TARGETED_DEVICE_FAMILY = "1,2";
                      };
                      name = Release;
                  };
          /* End XCBuildConfiguration section */

          /* Begin XCConfigurationList section */
                  4A0000000000000000000050 /* Build configuration list for PBXNativeTarget "MovieBoxApp" */ = {
                      isa = XCConfigurationList;
                      buildConfigurations = (
                          4A0000000000000000000090 /* Debug */,
                          4A0000000000000000000091 /* Release */,
                      );
                      defaultConfigurationIsVisible = 0;
                      defaultConfigurationName = Release;
                  };
                  4A0000000000000000000070 /* Build configuration list for PBXProject "MovieBoxApp" */ = {
                      isa = XCConfigurationList;
                      buildConfigurations = (
                          4A0000000000000000000080 /* Debug */,
                          4A0000000000000000000081 /* Release */,
                      );
                      defaultConfigurationIsVisible = 0;
                      defaultConfigurationName = Release;
                  };
          /* End XCConfigurationList section */
              };
              rootObject = 4A0000000000000000000060 /* Project object */;
          }
          """

          try! pbxproj.write(toFile: "project.pbxproj", atomically: true, encoding: .utf8)
          EOF

          # 4. تشغيل السكربت لإنشاء project.pbxproj
          swift generate_project.swift

          # 5. بناء التطبيق وأرشفته
          xcodebuild -project MovieBoxApp.xcodeproj \
          -scheme MovieBoxApp \
          -configuration Release \
          -archivePath build/MovieBoxApp.xcarchive \
          -destination "generic/platform=iOS" \
          archive CODE_SIGNING_ALLOWED=NO

          # 6. استخراج ملف .ipa
          mkdir -p Payload
          cp -r build/MovieBoxApp.xcarchive/Products/Applications/MovieBoxApp.app Payload/
          zip -r MovieBox-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieBox-Unsigned-IPA
          path: MovieBoxApp/MovieBox-Unsigned.ipa
